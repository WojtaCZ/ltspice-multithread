const Rin   = DATA.Rin;
const Cin   = DATA.Cin;
const Ileak = DATA.Ileak;
const ADC   = DATA.ADC_SMPL_CYCLES;
const Z     = DATA.vadc_lsb_error;  // Z[ri][ci][ki][ai]

const nR = Rin.length;
const nC = Cin.length;
const nI = Ileak.length;
const nA = ADC.length;

// ----- Global log colour range across all data -----
let minPos = Infinity, maxVal = -Infinity;
for (let r = 0; r < nR; r++)
  for (let c = 0; c < nC; c++)
    for (let k = 0; k < nI; k++)
      for (let a = 0; a < nA; a++) {
        const v = Z[r][c][k][a];
        if (v > 0) {
          if (v < minPos) minPos = v;
          if (v > maxVal) maxVal = v;
        }
      }
const epsVal = isFinite(minPos) ? minPos * 0.1 : 1e-9;
const logLo  = Math.log10(epsVal);
const logHi  = isFinite(maxVal) ? Math.min(Math.log10(maxVal), 1) : 0;  // heatmap/colorbar, capped at 10 LSB
// Profile chart axis range is computed per-hover (see drawProfiles).

// ----- Layout -----
const PAD_L       = 60;
const PAD_T       = 16;
const PROF_TOP_H  = 60;
const PROF_GAP    = 8;
const CELL_W      = 24;
const CELL_H      = 12;
const PLOT_W      = nC * CELL_W;
const PLOT_H      = nR * CELL_H;
const PROF_RIGHT_W= 70;
const CB_GAP      = 14;
const CB_W        = 20;
const CB_LBL      = 55;
const X_LBL       = 130;

const HEATMAP_X      = PAD_L;
const HEATMAP_Y      = PAD_T + PROF_TOP_H + PROF_GAP;
const TOP_PROF_X     = PAD_L;
const TOP_PROF_Y     = PAD_T;
const RIGHT_PROF_X   = PAD_L + PLOT_W + PROF_GAP;
const RIGHT_PROF_Y   = HEATMAP_Y;
const CB_X           = RIGHT_PROF_X + PROF_RIGHT_W + CB_GAP;
const CB_Y           = HEATMAP_Y;

const CANVAS_W = CB_X + CB_W + CB_LBL;
const CANVAS_H = HEATMAP_Y + PLOT_H + X_LBL;

const cv      = document.getElementById('cv');
const overlay = document.getElementById('overlay');
const dpr     = window.devicePixelRatio || 1;
for (const c of [cv, overlay]) {
  c.width  = CANVAS_W * dpr;
  c.height = CANVAS_H * dpr;
  c.style.width  = CANVAS_W + 'px';
  c.style.height = CANVAS_H + 'px';
}
const ctx  = cv.getContext('2d');
const octx = overlay.getContext('2d');
ctx.scale(dpr, dpr);
octx.scale(dpr, dpr);

// ----- Helpers -----
function jet(t) {
  t = Math.max(0, Math.min(1, t));
  const r = Math.max(0, Math.min(1, Math.min(4*t - 1.5, -4*t + 4.5)));
  const g = Math.max(0, Math.min(1, Math.min(4*t - 0.5, -4*t + 3.5)));
  const b = Math.max(0, Math.min(1, Math.min(4*t + 0.5, -4*t + 2.5)));
  return `rgb(${Math.round(r*255)},${Math.round(g*255)},${Math.round(b*255)})`;
}

function engStr(v) {
  if (v === 0) return '0';
  const prefixes  = ['f','p','n','u','m','','k','M','G','T'];
  const exponents = [-15,-12,-9,-6,-3,0,3,6,9,12];
  let e = Math.floor(Math.log10(Math.abs(v)) / 3) * 3;
  e = Math.max(exponents[0], Math.min(exponents[exponents.length-1], e));
  const idx = exponents.indexOf(e);
  const scaled = v / Math.pow(10, exponents[idx]);
  if (Math.abs(scaled - Math.round(scaled)) < 1e-9 * (Math.abs(scaled) + Number.EPSILON)) {
    return `${Math.round(scaled)}${prefixes[idx]}`;
  }
  let s = scaled.toPrecision(4);
  if (s.indexOf('.') > -1 && s.indexOf('e') < 0) s = s.replace(/0+$/, '').replace(/\.$/, '');
  return `${s}${prefixes[idx]}`;
}

function freqStr(f) {
  const fmt = (x) => {
    let s = x.toPrecision(3);
    if (s.indexOf('.') > -1 && s.indexOf('e') < 0) s = s.replace(/0+$/, '').replace(/\.$/, '');
    return s;
  };
  if (f >= 1e9) return `${fmt(f/1e9)} GHz`;
  if (f >= 1e6) return `${fmt(f/1e6)} MHz`;
  if (f >= 1e3) return `${fmt(f/1e3)} kHz`;
  return `${fmt(f)} Hz`;
}

function supScript(n) {
  const m = {'-':'⁻','0':'⁰','1':'¹','2':'²','3':'³','4':'⁴','5':'⁵','6':'⁶','7':'⁷','8':'⁸','9':'⁹'};
  return String(n).split('').map(ch => m[ch] || ch).join('');
}

// log(value) → fraction within [logLo, logHi] for the heatmap/colorbar (values above logHi saturate via jet())
function logFrac(v) {
  const lv = Math.log10(Math.max(v, epsVal));
  return (lv - logLo) / (logHi - logLo);
}

function colX(c) { return HEATMAP_X + c * CELL_W + CELL_W / 2; }
function rowY(r) { return HEATMAP_Y + (nR - 1 - r) * CELL_H + CELL_H / 2; }

// ----- DOM refs -----
const sldI = document.getElementById('sld_ileak');
const sldA = document.getElementById('sld_adc');
const lblI = document.getElementById('lbl_ileak');
const lblA = document.getElementById('lbl_adc');
const ttl  = document.getElementById('title');
const tip  = document.getElementById('tooltip');

sldI.max = nI - 1;
sldA.max = nA - 1;
if (nI === 1) sldI.disabled = true;
if (nA === 1) sldA.disabled = true;

// ----- Static render (heatmap, axes, colorbar, profile frames) -----
function render() {
  const ki = +sldI.value;
  const ai = +sldA.value;

  lblI.textContent = engStr(Ileak[ki]) + ' A';
  lblA.textContent = '' + ADC[ai];
  ttl.innerHTML = `I<sub>leak</sub> = ${engStr(Ileak[ki])} A &nbsp;&nbsp;&nbsp; ADC cycles = ${ADC[ai]}`;

  ctx.fillStyle = '#ffffff';
  ctx.fillRect(0, 0, CANVAS_W, CANVAS_H);

  // Heatmap cells
  for (let r = 0; r < nR; r++) {
    const y = HEATMAP_Y + (nR - 1 - r) * CELL_H;
    for (let c = 0; c < nC; c++) {
      const v = Z[r][c][ki][ai];
      ctx.fillStyle = jet(logFrac(v));
      ctx.fillRect(HEATMAP_X + c * CELL_W, y, CELL_W + 1, CELL_H + 1);
    }
  }

  // Heatmap border
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(HEATMAP_X + 0.5, HEATMAP_Y + 0.5, PLOT_W, PLOT_H);

  // Y axis labels (Rin)
  ctx.fillStyle = 'black';
  ctx.font = '11px Arial';
  ctx.textAlign = 'right';
  ctx.textBaseline = 'middle';
  for (let r = 0; r < nR; r++) {
    ctx.fillText(engStr(Rin[r]), HEATMAP_X - 4, rowY(r));
  }

  // X axis labels (Cin), rotated 45°
  for (let c = 0; c < nC; c++) {
    const x = colX(c);
    const y = HEATMAP_Y + PLOT_H + 4;
    ctx.save();
    ctx.translate(x, y);
    ctx.rotate(-Math.PI / 4);
    ctx.textAlign = 'right';
    ctx.textBaseline = 'middle';
    ctx.fillText(engStr(Cin[c]) + 'F', 0, 0);
    ctx.restore();
  }

  // Axis titles
  ctx.font = '12px Arial';
  ctx.textAlign = 'center';
  ctx.textBaseline = 'alphabetic';
  ctx.fillText('C_in', HEATMAP_X + PLOT_W / 2, CANVAS_H - 8);
  ctx.save();
  ctx.translate(12, HEATMAP_Y + PLOT_H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.fillText('R_in', 0, 0);
  ctx.restore();

  // ----- Profile frame borders (decade gridlines are drawn per-hover into the overlay) -----
  ctx.strokeStyle = '#333';
  ctx.lineWidth = 1;
  ctx.strokeRect(TOP_PROF_X + 0.5,   TOP_PROF_Y + 0.5,   PLOT_W,        PROF_TOP_H);
  ctx.strokeRect(RIGHT_PROF_X + 0.5, RIGHT_PROF_Y + 0.5, PROF_RIGHT_W,  PLOT_H);

  // ----- Colorbar -----
  const STEPS = 96;
  const sh = PLOT_H / STEPS;
  for (let i = 0; i < STEPS; i++) {
    const t = 1 - i / (STEPS - 1);
    ctx.fillStyle = jet(t);
    ctx.fillRect(CB_X, CB_Y + i * sh, CB_W, sh + 1);
  }
  ctx.strokeStyle = '#333';
  ctx.strokeRect(CB_X + 0.5, CB_Y + 0.5, CB_W, PLOT_H);

  ctx.fillStyle = 'black';
  ctx.font = '11px Arial';
  ctx.textAlign = 'left';
  ctx.textBaseline = 'middle';
  const tickLo = Math.ceil(logLo);
  const tickHi = Math.floor(logHi);
  let ticks = [];
  for (let e = tickLo; e <= tickHi; e++) ticks.push(e);
  if (ticks.length < 2) {
    ticks = [];
    for (let i = 0; i < 5; i++) ticks.push(Math.round(logLo + i * (logHi - logLo) / 4));
  }
  for (const e of ticks) {
    const t = (e - logLo) / (logHi - logLo);
    const y = CB_Y + PLOT_H - t * PLOT_H;
    ctx.strokeStyle = '#333';
    ctx.beginPath();
    ctx.moveTo(CB_X + CB_W, y);
    ctx.lineTo(CB_X + CB_W + 4, y);
    ctx.stroke();
    ctx.fillText('10' + supScript(e), CB_X + CB_W + 6, y);
  }

  ctx.save();
  ctx.translate(CANVAS_W - 6, CB_Y + PLOT_H / 2);
  ctx.rotate(-Math.PI / 2);
  ctx.textAlign = 'center';
  ctx.textBaseline = 'middle';
  ctx.font = '12px Arial';
  ctx.fillText('LSB error', 0, 0);
  ctx.restore();
}

// ----- Dynamic overlay (highlight cell + profile lines) -----
function clearOverlay() {
  octx.clearRect(0, 0, CANVAS_W, CANVAS_H);
}

// Build log-range [lo, hi] from positive values supplied by `getter(i)` for i in 0..n-1.
// Falls back to a sensible default when the slice has no positive values or all values are equal.
function sliceLogRange(getter, n) {
  let lo = Infinity, hi = -Infinity;
  for (let i = 0; i < n; i++) {
    const v = getter(i);
    if (v > 0) {
      const lv = Math.log10(v);
      if (lv < lo) lo = lv;
      if (lv > hi) hi = lv;
    }
  }
  if (!isFinite(lo)) return [logLo, logLo + 1];   // no positive samples → arbitrary 1-decade range
  if (lo === hi)     return [lo - 0.5, hi + 0.5]; // all equal → centred 1-decade span
  return [lo, hi];
}

function drawProfiles(c_hov, rTop_hov) {
  clearOverlay();

  const r_hov = nR - 1 - rTop_hov;
  const ki = +sldI.value;
  const ai = +sldA.value;

  // Per-hover log ranges (top profile uses the selected row, right profile uses the selected column)
  const [tLo, tHi] = sliceLogRange(c => Z[r_hov][c][ki][ai], nC);
  const [rLo, rHi] = sliceLogRange(r => Z[r][c_hov][ki][ai], nR);
  const tFloor = Math.pow(10, tLo);
  const rFloor = Math.pow(10, rLo);
  const topY = v => TOP_PROF_Y + PROF_TOP_H -
                    (Math.log10(Math.max(v, tFloor)) - tLo) / (tHi - tLo) * PROF_TOP_H;
  const rgtX = v => RIGHT_PROF_X +
                    (Math.log10(Math.max(v, rFloor)) - rLo) / (rHi - rLo) * PROF_RIGHT_W;

  // ----- Decade gridlines that fall inside the per-hover range -----
  octx.strokeStyle = '#dcdcdc';
  octx.lineWidth = 1;
  octx.beginPath();
  for (let e = Math.ceil(tLo); e <= Math.floor(tHi); e++) {
    const t = (e - tLo) / (tHi - tLo);
    const y = TOP_PROF_Y + PROF_TOP_H - t * PROF_TOP_H + 0.5;
    octx.moveTo(TOP_PROF_X, y);
    octx.lineTo(TOP_PROF_X + PLOT_W, y);
  }
  for (let e = Math.ceil(rLo); e <= Math.floor(rHi); e++) {
    const t = (e - rLo) / (rHi - rLo);
    const x = RIGHT_PROF_X + t * PROF_RIGHT_W + 0.5;
    octx.moveTo(x, RIGHT_PROF_Y);
    octx.lineTo(x, RIGHT_PROF_Y + PLOT_H);
  }
  octx.stroke();

  // ----- Top profile: error vs Cin at fixed Rin=r_hov -----
  octx.strokeStyle = '#1e5fb6';
  octx.lineWidth = 1.6;
  octx.beginPath();
  for (let c = 0; c < nC; c++) {
    const v = Z[r_hov][c][ki][ai];
    const x = colX(c);
    const y = topY(v);
    if (c === 0) octx.moveTo(x, y); else octx.lineTo(x, y);
  }
  octx.stroke();
  for (let c = 0; c < nC; c++) {
    const v = Z[r_hov][c][ki][ai];
    const x = colX(c);
    const y = topY(v);
    const sel = (c === c_hov);
    octx.fillStyle = sel ? '#d23030' : '#1e5fb6';
    octx.beginPath();
    octx.arc(x, y, sel ? 4 : 2.2, 0, Math.PI * 2);
    octx.fill();
  }
  octx.strokeStyle = 'rgba(210, 48, 48, 0.5)';
  octx.lineWidth = 1;
  octx.setLineDash([3, 3]);
  octx.beginPath();
  octx.moveTo(colX(c_hov) + 0.5, TOP_PROF_Y);
  octx.lineTo(colX(c_hov) + 0.5, TOP_PROF_Y + PROF_TOP_H);
  octx.stroke();
  octx.setLineDash([]);

  // ----- Right profile: error vs Rin at fixed Cin=c_hov -----
  octx.strokeStyle = '#1e5fb6';
  octx.lineWidth = 1.6;
  octx.beginPath();
  for (let r = 0; r < nR; r++) {
    const v = Z[r][c_hov][ki][ai];
    const x = rgtX(v);
    const y = rowY(r);
    if (r === 0) octx.moveTo(x, y); else octx.lineTo(x, y);
  }
  octx.stroke();
  for (let r = 0; r < nR; r++) {
    const v = Z[r][c_hov][ki][ai];
    const x = rgtX(v);
    const y = rowY(r);
    const sel = (r === r_hov);
    octx.fillStyle = sel ? '#d23030' : '#1e5fb6';
    octx.beginPath();
    octx.arc(x, y, sel ? 4 : 2.2, 0, Math.PI * 2);
    octx.fill();
  }
  octx.strokeStyle = 'rgba(210, 48, 48, 0.5)';
  octx.lineWidth = 1;
  octx.setLineDash([3, 3]);
  octx.beginPath();
  octx.moveTo(RIGHT_PROF_X,                rowY(r_hov) + 0.5);
  octx.lineTo(RIGHT_PROF_X + PROF_RIGHT_W, rowY(r_hov) + 0.5);
  octx.stroke();
  octx.setLineDash([]);

  // ----- Cell highlight on the heatmap -----
  const hx = HEATMAP_X + c_hov * CELL_W;
  const hy = HEATMAP_Y + rTop_hov * CELL_H;
  octx.strokeStyle = '#000';
  octx.lineWidth = 1;
  octx.strokeRect(hx + 0.5, hy + 0.5, CELL_W, CELL_H);
  octx.strokeStyle = '#fff';
  octx.lineWidth = 2;
  octx.strokeRect(hx + 2, hy + 2, CELL_W - 3, CELL_H - 3);
}

// ----- Tooltip update + positioning -----
function updateTooltip(c_hov, rTop_hov, rect) {
  const r = nR - 1 - rTop_hov;
  const ki = +sldI.value;
  const ai = +sldA.value;
  const err = Z[r][c_hov][ki][ai];
  const fc  = 1 / (2 * Math.PI * Rin[r] * Cin[c_hov]);

  tip.innerHTML =
    `R<sub>in</sub> = ${engStr(Rin[r])} &Omega;<br>` +
    `C<sub>in</sub> = ${engStr(Cin[c_hov])}F<br>` +
    `Error = ${err.toFixed(4)} LSB<br>` +
    `f<sub>c</sub> = ${freqStr(fc)}`;

  const sx = rect.width  / CANVAS_W;
  const sy = rect.height / CANVAS_H;
  const cellCenterX_css = (HEATMAP_X + c_hov * CELL_W + CELL_W / 2) * sx;
  const cellTopY_css    = (HEATMAP_Y + rTop_hov * CELL_H)           * sy;
  const cellBotY_css    = (HEATMAP_Y + (rTop_hov + 1) * CELL_H)     * sy;

  const tipH = tip.offsetHeight;
  const tipW = tip.offsetWidth;
  const above = cellTopY_css >= tipH + 12;
  const top   = above ? (cellTopY_css - tipH - 8) : (cellBotY_css + 8);
  let left = cellCenterX_css - tipW / 2;
  const maxLeft = rect.width - tipW - 4;
  if (left < 4) left = 4;
  if (left > maxLeft) left = maxLeft;

  tip.style.top  = top  + 'px';
  tip.style.left = left + 'px';
  tip.style.visibility = 'visible';
}

// ----- Hover handling -----
let lastC = -1, lastRTop = -1;

cv.addEventListener('mousemove', (e) => {
  const rect = cv.getBoundingClientRect();
  const x = (e.clientX - rect.left) * (CANVAS_W / rect.width);
  const y = (e.clientY - rect.top)  * (CANVAS_H / rect.height);
  const inside = x >= HEATMAP_X && x < HEATMAP_X + PLOT_W
              && y >= HEATMAP_Y && y < HEATMAP_Y + PLOT_H;
  if (inside) {
    const c    = Math.floor((x - HEATMAP_X) / CELL_W);
    const rTop = Math.floor((y - HEATMAP_Y) / CELL_H);
    if (c !== lastC || rTop !== lastRTop) {
      lastC = c; lastRTop = rTop;
      drawProfiles(c, rTop);
    }
    updateTooltip(c, rTop, rect);
  } else if (lastC !== -1 || lastRTop !== -1) {
    lastC = -1; lastRTop = -1;
    clearOverlay();
    tip.style.visibility = 'hidden';
  }
});

cv.addEventListener('mouseleave', () => {
  lastC = -1; lastRTop = -1;
  clearOverlay();
  tip.style.visibility = 'hidden';
});

function onSlide() {
  render();
  if (lastC >= 0 && lastRTop >= 0) {
    drawProfiles(lastC, lastRTop);
    const rect = cv.getBoundingClientRect();
    updateTooltip(lastC, lastRTop, rect);
  }
}
sldI.addEventListener('input', onSlide);
sldA.addEventListener('input', onSlide);

render();
</script>
</body>
</html>
